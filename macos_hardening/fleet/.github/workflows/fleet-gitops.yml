# .github/workflows/fleet-gitops.yml
#
# Applies the lazybox Fleet GitOps configuration.
#   * Pull requests           -> `fleetctl gitops --dry-run` (validate only).
#   * Push to the main branch  -> `fleetctl gitops` (apply for real).
#
# Mirrors the official fleetdm/fleet-gitops workflow. Required repository
# secrets:
#   FLEET_URL                        - https URL of the Fleet server
#   FLEET_API_TOKEN                  - an API-only user token with GitOps perms
#   FLEET_GLOBAL_ENROLL_SECRET        - global enroll secret ($-expanded in YAML)
#   FLEET_WORKSTATIONS_ENROLL_SECRET  - Workstations team enroll secret
#
# Note: paths are relative to this file's repo root. If this fleet/ directory is
# a subdirectory of a larger repo, set `working-directory` / the -f paths
# accordingly (here we assume the workflow runs from the fleet/ root).

name: fleet-gitops

on:
  push:
    branches:
      - main
    paths:
      - "default.yml"
      - "teams/**"
      - "lib/**"
      - ".github/workflows/fleet-gitops.yml"
  pull_request:
    paths:
      - "default.yml"
      - "teams/**"
      - "lib/**"
      - ".github/workflows/fleet-gitops.yml"
  workflow_dispatch: {}

# Avoid overlapping applies racing each other.
concurrency:
  group: fleet-gitops-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitops:
    runs-on: ubuntu-latest
    env:
      FLEET_URL: ${{ secrets.FLEET_URL }}
      FLEET_API_TOKEN: ${{ secrets.FLEET_API_TOKEN }}
      FLEET_GLOBAL_ENROLL_SECRET: ${{ secrets.FLEET_GLOBAL_ENROLL_SECRET }}
      FLEET_WORKSTATIONS_ENROLL_SECRET: ${{ secrets.FLEET_WORKSTATIONS_ENROLL_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fleetctl
        run: npm install -g fleetctl

      # Dry run on pull requests: validates YAML + diff without applying.
      - name: fleetctl gitops (dry run)
        if: github.event_name == 'pull_request'
        run: fleetctl gitops --dry-run -f default.yml -f teams/workstations.yml

      # Apply on push to main (and manual dispatch).
      - name: fleetctl gitops (apply)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: fleetctl gitops -f default.yml -f teams/workstations.yml
